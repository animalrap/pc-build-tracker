services:
  backend:
    image: ghcr.io/YOURUSERNAME/pc-build-tracker-backend:latest
    container_name: pc-build-tracker-api
    restart: unless-stopped
    volumes:
      - ./config:/config
    environment:
      DB_PATH: /config/tracker.db

  frontend:
    image: ghcr.io/YOURUSERNAME/pc-build-tracker-frontend:latest
    container_name: pc-build-tracker-ui
    restart: unless-stopped
    ports:
      - "7236:80"
    depends_on:
      - backend

# Replace YOURUSERNAME with your GitHub username (lowercase)
# Images are auto-built and pushed to ghcr.io on every git push to main
# In Dockge: use the Pull button to update to the latest build
